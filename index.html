<!DOCTYPE html>
<html>

<head>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding-top: 100px;
  }

  h1 {
    font-size: 48px;
    margin-bottom: 20px;
  }

  input {
    padding: 12px;
    width: 250px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
  }

  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #ff007f;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #ff3399;
  }
</style>
</head>

<body>


<h1>NovaLine</h1>

<p style="margin-bottom: 20px; color: #aaa;">
  Unlimited Talk, Text & Data. No Contracts. No Limits.
</p>

<form id="leadForm" onsubmit="return submitLead(event)">
  <input type="text" id="phone" placeholder="Enter your phone number" required>
  <button type="submit">Get Started</button>
</form>

<script>
async function submitLead(e) {
  e.preventDefault();

  let phone = document.getElementById("phone").value.trim();
  if (!phone.startsWith("+1")) {
    phone = "+1" + phone.replace(/\D/g, "");
  }

  try {
    const response = await fetch("/api/index", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ phone: phone })
    });

    const data = await response.json().catch(() => ({}));

    if (response.ok) {
      alert("Request sent! Check your phone 📲");
    } else {
      alert(JSON.stringify(data));
    }
  } catch (err) {
    alert("Network error.");
  }

  return false;
}
</script>

</body>
</html>
